steps:
  # Build and deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - signalix
      - --source=.
      - --region=asia-southeast1
      - --allow-unauthenticated
      - --memory=512Mi
      - --timeout=900
      - --update-secrets=LINE_CHANNEL_ACCESS_TOKEN=LINE_CHANNEL_ACCESS_TOKEN:latest,LINE_CHANNEL_SECRET=LINE_CHANNEL_SECRET:latest,SCAN_SECRET=SCAN_SECRET:latest,SETTRADE_APP_ID=SETTRADE_APP_ID:latest,SETTRADE_APP_SECRET=SETTRADE_APP_SECRET:latest,SETTRADE_BROKER_ID=SETTRADE_BROKER_ID:latest,SETTRADE_APP_CODE=SETTRADE_APP_CODE:latest
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,ENVIRONMENT=production,BQ_DATASET=signalix

options:
  logging: CLOUD_LOGGING_ONLY
