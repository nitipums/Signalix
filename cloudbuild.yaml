steps:
  # Build and deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - signalix
      - --source=.
      - --region=asia-southeast1
      - --allow-unauthenticated
      - --memory=512Mi
      - --timeout=900
      - --update-secrets=LINE_CHANNEL_ACCESS_TOKEN=LINE_CHANNEL_ACCESS_TOKEN:latest,LINE_CHANNEL_SECRET=LINE_CHANNEL_SECRET:latest,SCAN_SECRET=SCAN_SECRET:latest,SETTRADE_APP_ID=SETTRADE_APP_ID:latest,SETTRADE_APP_SECRET=SETTRADE_APP_SECRET:latest,SETTRADE_BROKER_ID=SETTRADE_BROKER_ID:latest,SETTRADE_APP_CODE=SETTRADE_APP_CODE:latest,SETTRADE_ACCOUNT_NO=SETTRADE_ACCOUNT_NO:latest,SETTRADE_PIN=SETTRADE_PIN:latest
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,ENVIRONMENT=production,BQ_DATASET=signalix,TRADING_ENABLED=true,TRADING_MODE=paper,MIN_STRENGTH_SCORE=70,ALLOWED_PATTERNS=breakout\,ath_breakout\,vcp\,vcp_low_cheat,RISK_PER_TRADE_PCT=0.01,REWARD_R_MULTIPLE=2.5,MAX_POSITION_SIZE_THB=5000,MAX_OPEN_POSITIONS=1,MAX_DAILY_LOSS_THB=2000,ENTRY_PRICE_TYPE=Limit,BOARD_LOT=100

options:
  logging: CLOUD_LOGGING_ONLY
