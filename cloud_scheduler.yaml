# Cloud Scheduler job definitions for Signalix
# Deploy with: gcloud scheduler jobs create http <name> --flags...
#
# All times are Asia/Bangkok (ICT). timeZone field tells Cloud Scheduler
# to interpret cron as local time — no UTC conversion needed.
#
# ─────────────────────────────────────────────────────────────────────────
# Pre-launch posture: only 2 scheduled scans per day (was 4) to save LINE
# push quota. Each scan broadcasts ONLY the market breadth card — the
# per-scan Breakout / Trend-Change / watchlist pushes are disabled in
# main.py::_broadcast_full_report. See CLAUDE.md "Deploy pipeline" for
# launch-day restoration.
#
# If the previously-configured Cloud Scheduler jobs signalix-midday-scan
# and signalix-preclose-scan are still live, delete them once:
#   gcloud scheduler jobs delete signalix-midday-scan  --location=asia-southeast1 --quiet
#   gcloud scheduler jobs delete signalix-preclose-scan --location=asia-southeast1 --quiet
# ─────────────────────────────────────────────────────────────────────────

jobs:

  - name: signalix-morning-scan
    description: "10:15 ICT — Morning intraday scan + breadth broadcast"
    schedule: "15 10 * * 1-5"
    timeZone: "Asia/Bangkok"
    httpTarget:
      uri: "${CLOUD_RUN_URL}/scan"
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-Scan-Secret: "${SCAN_SECRET}"
      body: '{"scan_type": "breakout", "broadcast": true, "mode": "intraday"}'

  - name: signalix-postclose-report
    description: "16:45 ICT — Post-close full scan + breadth broadcast + BigQuery update"
    schedule: "45 16 * * 1-5"
    timeZone: "Asia/Bangkok"
    httpTarget:
      uri: "${CLOUD_RUN_URL}/scan"
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-Scan-Secret: "${SCAN_SECRET}"
      body: '{"scan_type": "full", "broadcast": true, "mode": "full"}'
